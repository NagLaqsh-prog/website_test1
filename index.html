<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Flipkart Clone</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <header class="navbar">
    <div class="logo">Flipkart</div>
    <input type="text" placeholder="Search for products..." />
    <button class="cart-btn">Cart (<span id="cart-count">0</span>)</button>
  </header>

  <!-- Products -->
  <main class="products">
    <div class="product">
      <img src="https://via.placeholder.com/200" alt="Product">
      <h3>Smartphone</h3>
      <p>₹15,999</p>
      <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/200" alt="Product">
      <h3>Headphones</h3>
      <p>₹1,999</p>
      <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/200" alt="Product">
      <h3>Laptop</h3>
      <p>₹55,999</p>
      <button onclick="addToCart()">Add to Cart</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
